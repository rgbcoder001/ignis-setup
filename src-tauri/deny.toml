# cargo-deny configuration for ignis-setup
# Used by the weekly dep-update workflow to guard against known CVEs,
# supply chain attacks, and problematic licenses.

[advisories]
# Deny crates listed in the RustSec advisory database
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
version = 2
# Deny anything without a recognised open-source license
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
# Copyleft is a warning, not a hard deny — Tauri itself uses MPL-2.0
copyleft = "warn"

[bans]
# Warn on duplicate versions of the same crate — a common supply chain
# attack vector where a malicious version is injected alongside a legit one
multiple-versions = "warn"
# Deny wildcard dependency specs (e.g. foo = "*")
wildcards = "deny"

[sources]
# Only allow crates from the official crates.io registry and verified git sources
# — blocks typosquatting and malicious alternative registries
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
