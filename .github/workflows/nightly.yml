name: Nightly build

# Runs on every merge to main (after CI passes).
# Produces a downloadable AppImage and publishes it as a rolling GitHub Release
# under the "nightly" tag — always points to the latest build on main.
# When you're ready for an official release, push a version tag instead.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "CHANGELOG.md"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel any in-progress nightly when a new commit lands
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build-nightly:
    name: Build nightly AppImage
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # needed to create/update the nightly release

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: nightly

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            fuse

      - name: Install npm dependencies
        run: npm install

      - name: Stamp nightly version
        # Appends the short commit SHA so nightly builds are distinguishable
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          CURRENT=$(node -p "require('./package.json').version")
          npm pkg set version="${CURRENT}-nightly.${SHORT_SHA}"
          sed -i "s/^version = \".*\"/version = \"${CURRENT}-nightly.${SHORT_SHA}\"/" \
            src-tauri/Cargo.toml

      - name: Build Tauri app (AppImage only)
        run: npm run tauri build -- --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Publish rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          FILENAME=$(basename "${APPIMAGE}")
          SIZE=$(du -sh "${APPIMAGE}" | cut -f1)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILT=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Write release notes to a file to avoid YAML quoting issues
          cat > /tmp/nightly-notes.md << EOF
          ## Ignis — Nightly Build

          Automatically updated on every push to \`main\`. Not a stable release.

          **Built from** [\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})

          ### Install on Bazzite / Linux

          \`\`\`bash
          chmod +x ${FILENAME}
          ./${FILENAME}
          \`\`\`

          AppImage runs on any Linux distro without installation — no sudo, no rpm-ostree reboot required.

          | | |
          |---|---|
          | Commit | \`${SHORT_SHA}\` |
          | Size | ${SIZE} |
          | Built | ${BUILT} |
          EOF

          # Delete old nightly release and tag so assets are always fresh
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          gh release create nightly \
            --prerelease \
            --title "Nightly Build" \
            --notes-file /tmp/nightly-notes.md \
            "${APPIMAGE}"

      - name: Post summary
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          SIZE=$(du -sh "${APPIMAGE}" 2>/dev/null | cut -f1 || echo "unknown")
          echo "### Nightly build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | \`$(basename "${APPIMAGE}")\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Download:** [github.com/${GITHUB_REPOSITORY}/releases/tag/nightly](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/nightly)" >> "$GITHUB_STEP_SUMMARY"
