name: Nightly build

# Runs on every merge to main (after CI passes).
# Produces a downloadable AppImage from the latest main branch code
# so contributors and testers can try the newest version without tagging a release.
#
# Artifacts are kept for 7 days (free storage; no permanent release created).
# When you're ready for an official release, push a version tag instead.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "CHANGELOG.md"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel any in-progress nightly when a new commit lands
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build-nightly:
    name: Build nightly AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Separate cache key from release builds so they don't interfere
          shared-key: nightly

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            fuse

      - name: Install npm dependencies
        run: npm install

      - name: Stamp nightly version
        # Appends the short commit SHA so nightly builds are distinguishable
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          CURRENT=$(node -p "require('./package.json').version")
          npm pkg set version="${CURRENT}-nightly.${SHORT_SHA}"
          sed -i "s/^version = \".*\"/version = \"${CURRENT}-nightly.${SHORT_SHA}\"/" \
            src-tauri/Cargo.toml

      - name: Build Tauri app (AppImage only)
        run: npm run tauri build -- --bundles appimage
        env:
          # Disable updater signature check for nightly builds
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload nightly AppImage
        uses: actions/upload-artifact@v7
        with:
          name: ignis-setup-nightly-${{ github.sha }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          # Short retention — nightlies are development snapshots, not releases
          retention-days: 7

      - name: Post summary
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)
          SIZE=$(du -sh "${APPIMAGE}" 2>/dev/null | cut -f1 || echo "unknown")
          echo "### Nightly build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | \`$(basename "${APPIMAGE}")\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expires | 7 days |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download from the [Actions run artifacts](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})." >> "$GITHUB_STEP_SUMMARY"
