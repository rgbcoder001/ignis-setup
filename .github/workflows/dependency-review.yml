name: Dependency review

# Scans new or updated dependencies in pull requests for known vulnerabilities.
# Uses GitHub's built-in dependency review action — free for public repositories.
# Fails the PR if a dependency with a known CVE is introduced.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependencies
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Fail on high/critical severity CVEs
          fail-on-severity: high
          # Comment on the PR with a summary of any new dependencies
          comment-summary-in-pr: always
          # Deny dependencies with GPL-incompatible licenses
          # (adjust if you want to allow GPL)
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
